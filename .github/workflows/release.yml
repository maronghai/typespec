name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Build linux-x86_64
        run: cd rune && zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux

      - name: Build linux-aarch64
        run: cd rune && zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux

      - name: Build macos-x86_64
        run: cd rune && zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-macos

      - name: Build macos-aarch64
        run: cd rune && zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Build windows-x86_64
        run: cd rune && zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-windows

      - name: Package binaries
        run: |
          cd rune/zig-out/bin
          tar czf ../../../rune-linux-x86_64.tar.gz rune
          tar czf ../../../rune-linux-aarch64.tar.gz rune
          tar czf ../../../rune-macos-x86_64.tar.gz rune
          tar czf ../../../rune-macos-aarch64.tar.gz rune
          7z a ../../../rune-windows-x86_64.zip rune.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rune-linux-x86_64.tar.gz
            rune-linux-aarch64.tar.gz
            rune-macos-x86_64.tar.gz
            rune-macos-aarch64.tar.gz
            rune-windows-x86_64.zip
